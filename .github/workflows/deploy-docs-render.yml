name: Deploy Docs to Render

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "docs/**"
      - "python/vfarm_device_sdk/**"
      - "scripts/check_docs_completeness.py"
      - "pyproject.toml"
      - ".github/workflows/deploy-docs-render.yml"
      - "render.yaml"
  workflow_dispatch:

concurrency:
  group: render-docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build Docs and Trigger Render Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify docs completeness
        run: |
          python scripts/check_docs_completeness.py --package-dir python/vfarm_device_sdk

      - name: Build docs
        run: |
          sphinx-build -W --keep-going -b html docs-site docs-site/_build/html

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DOCS_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing required secret: RENDER_DOCS_DEPLOY_HOOK_URL"
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
