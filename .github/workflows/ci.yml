name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: |
          pytest -q tests/unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    if: ${{ secrets.FARM_API_KEY != '' && secrets.SUPABASE_DB_URL != '' && secrets.SUPABASE_URL != '' && secrets.SUPABASE_KEY != '' }}
    env:
      FARM_API_KEY: ${{ secrets.FARM_API_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SDK_E2E_BASE_URL: http://localhost:8003
      SDK_E2E_SENSOR_TYPE: ${{ secrets.SDK_E2E_SENSOR_TYPE }}
      VFARM_REPO_URL: ${{ secrets.VFARM_REPO_URL != '' && secrets.VFARM_REPO_URL || 'https://github.com/stacxio/bhavfarm.git' }}
      VFARM_DIR: ${{ github.workspace }}/vfarm-upstream/vfarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Clone vfarm repository
        run: |
          git clone "${VFARM_REPO_URL}" "${{ github.workspace }}/vfarm-upstream"

      - name: Create vfarm .env for docker compose
        run: |
          cat > "${VFARM_DIR}/.env" <<EOF
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_KEY=${SUPABASE_KEY}
          FARM_API_KEY=${FARM_API_KEY}
          NGINX_PORT=8003
          EOF

      - name: Start vfarm docker stack
        working-directory: ${{ env.VFARM_DIR }}
        run: |
          docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8003/api/v1/health > /dev/null; then
              echo "vfarm API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for vfarm API health endpoint"
          exit 1

      - name: Run E2E tests
        run: |
          pytest -q tests/e2e

      - name: Stop vfarm docker stack
        if: always()
        working-directory: ${{ env.VFARM_DIR }}
        run: |
          docker compose down -v
