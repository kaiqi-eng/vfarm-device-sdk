name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  contract-check:
    name: Contract Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate SDK schema snapshot
        run: |
          python scripts/check_contract_snapshot.py

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: contract-check
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: |
          pytest -q tests/unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [contract-check, unit-tests]
    permissions:
      contents: read
    env:
      FARM_API_KEY: ${{ secrets.FARM_API_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SDK_E2E_BASE_URL: http://localhost:8003
      SDK_E2E_SENSOR_TYPE: ${{ secrets.SDK_E2E_SENSOR_TYPE }}
      VFARM_REPO_URL: ${{ secrets.VFARM_REPO_URL != '' && secrets.VFARM_REPO_URL || 'https://github.com/stacxio/bhavfarm.git' }}
      VFARM_REPO_TOKEN: ${{ secrets.VFARM_REPO_TOKEN }}
      VFARM_DIR: ${{ github.workspace }}/vfarm-upstream/vfarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect E2E secret availability
        id: preflight
        run: |
          if [ -n "${FARM_API_KEY}" ] && [ -n "${SUPABASE_DB_URL}" ] && [ -n "${SUPABASE_URL}" ] && [ -n "${SUPABASE_KEY}" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            echo "All required E2E secrets are present."
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "Skipping E2E: one or more required secrets are missing."
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.run_e2e == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Clone vfarm repository
        if: steps.preflight.outputs.run_e2e == 'true'
        run: |
          if [ -n "${VFARM_REPO_TOKEN}" ]; then
            case "${VFARM_REPO_URL}" in
              https://github.com/*)
                AUTH_URL="${VFARM_REPO_URL/https:\/\/github.com\//https:\/\/x-access-token:${VFARM_REPO_TOKEN}@github.com\/}"
                git clone "${AUTH_URL}" "${{ github.workspace }}/vfarm-upstream"
                ;;
              *)
                echo "VFARM_REPO_TOKEN is set, but VFARM_REPO_URL is not an https://github.com/... URL"
                exit 1
                ;;
            esac
          else
            git clone "${VFARM_REPO_URL}" "${{ github.workspace }}/vfarm-upstream"
          fi

      - name: Create vfarm .env for docker compose
        if: steps.preflight.outputs.run_e2e == 'true'
        run: |
          cat > "${VFARM_DIR}/.env" <<EOF
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_KEY=${SUPABASE_KEY}
          FARM_API_KEY=${FARM_API_KEY}
          NGINX_PORT=8003
          EOF

      - name: Start vfarm docker stack
        if: steps.preflight.outputs.run_e2e == 'true'
        working-directory: ${{ env.VFARM_DIR }}
        run: |
          docker compose up -d --build

      - name: Wait for API health
        if: steps.preflight.outputs.run_e2e == 'true'
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8003/api/v1/health > /dev/null; then
              echo "vfarm API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for vfarm API health endpoint"
          exit 1

      - name: Run E2E tests
        if: steps.preflight.outputs.run_e2e == 'true'
        run: |
          pytest -q tests/e2e

      - name: Stop vfarm docker stack
        if: always() && steps.preflight.outputs.run_e2e == 'true'
        working-directory: ${{ env.VFARM_DIR }}
        run: |
          docker compose down -v
