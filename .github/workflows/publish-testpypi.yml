name: Publish to TestPyPI

on:
  workflow_dispatch:

jobs:
  test:
    name: Run Unit + E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FARM_API_KEY: ${{ secrets.FARM_API_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SDK_E2E_BASE_URL: http://localhost:8003
      SDK_E2E_SENSOR_TYPE: ${{ secrets.SDK_E2E_SENSOR_TYPE }}
      VFARM_REPO_URL: ${{ secrets.VFARM_REPO_URL != '' && secrets.VFARM_REPO_URL || 'https://github.com/stacxio/bhavfarm.git' }}
      VFARM_REPO_TOKEN: ${{ secrets.VFARM_REPO_TOKEN }}
      VFARM_DIR: ${{ github.workspace }}/vfarm-upstream/vfarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        run: |
          test -n "${FARM_API_KEY}" || (echo "Missing required secret: FARM_API_KEY" && exit 1)
          test -n "${SUPABASE_DB_URL}" || (echo "Missing required secret: SUPABASE_DB_URL" && exit 1)
          test -n "${SUPABASE_URL}" || (echo "Missing required secret: SUPABASE_URL" && exit 1)
          test -n "${SUPABASE_KEY}" || (echo "Missing required secret: SUPABASE_KEY" && exit 1)

      - name: Install SDK with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Clone vfarm repository
        run: |
          if [ -n "${VFARM_REPO_TOKEN}" ]; then
            case "${VFARM_REPO_URL}" in
              https://github.com/*)
                AUTH_URL="${VFARM_REPO_URL/https:\/\/github.com\//https:\/\/x-access-token:${VFARM_REPO_TOKEN}@github.com\/}"
                git clone "${AUTH_URL}" "${{ github.workspace }}/vfarm-upstream"
                ;;
              *)
                echo "VFARM_REPO_TOKEN is set, but VFARM_REPO_URL is not an https://github.com/... URL"
                exit 1
                ;;
            esac
          else
            git clone "${VFARM_REPO_URL}" "${{ github.workspace }}/vfarm-upstream"
          fi

      - name: Create vfarm .env for docker compose
        run: |
          cat > "${VFARM_DIR}/.env" <<EOF
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_KEY=${SUPABASE_KEY}
          FARM_API_KEY=${FARM_API_KEY}
          NGINX_PORT=8003
          EOF

      - name: Start vfarm docker stack
        working-directory: ${{ env.VFARM_DIR }}
        run: |
          docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8003/api/v1/health > /dev/null; then
              echo "vfarm API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for vfarm API health endpoint"
          exit 1

      - name: Run all tests
        run: |
          pytest -q tests/unit tests/e2e

      - name: Stop vfarm docker stack
        if: always()
        working-directory: ${{ env.VFARM_DIR }}
        run: |
          docker compose down -v

  build-and-publish:
    name: Build + Publish to TestPyPI
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
